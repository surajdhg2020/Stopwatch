<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Suraj Focus</title><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif}.dark{--bg:#0b0f0e;--card:#131918;--soft:#1c2422;--text:#f4f3ed;--muted:#82908c;--line:#26312e;--accent:#b9ef55}.light{--bg:#eeeae0;--card:#faf8f2;--soft:#e7e4da;--text:#121716;--muted:#66706c;--line:#d6d5cc;--accent:#16805f}main{min-height:100vh;background:var(--bg);color:var(--text);padding:28px clamp(20px,5vw,70px)}button,input{font:inherit}.top{max-width:1200px;margin:auto;display:flex;justify-content:space-between;align-items:center}.brand{font-size:13px;font-weight:900;letter-spacing:.14em}.brand b{display:inline-grid;place-items:center;width:35px;height:35px;border-radius:50%;background:var(--accent);color:var(--bg);font-size:24px;margin-right:10px}.tools{display:flex;gap:8px}.tools button,.presets button,.presets label{border:1px solid var(--line);background:var(--soft);color:var(--muted);border-radius:10px;padding:10px 13px;font-size:11px;font-weight:800;cursor:pointer}.tools .on{background:var(--accent);color:var(--bg)}.grid{max-width:1200px;margin:50px auto 30px;display:grid;grid-template-columns:1.15fr .85fr;gap:20px}.card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:clamp(25px,4vw,52px);min-height:600px}.label{font-size:10px;font-weight:900;letter-spacing:.22em;color:var(--accent);margin:0 0 12px}.title{width:100%;border:0;background:transparent;color:var(--text);font-size:clamp(27px,4vw,42px);font-weight:800;outline:0}.clock{font-size:clamp(82px,12vw,155px);font-weight:900;letter-spacing:-.09em;line-height:1;margin:60px 0 25px;font-variant-numeric:tabular-nums}.clock i{font-style:normal;color:var(--accent)}.track{height:7px;background:var(--soft);border-radius:9px;overflow:hidden}.track span{height:100%;display:block;background:var(--accent)}.presets{display:flex;gap:8px;margin:25px 0;flex-wrap:wrap}.presets .sel{border-color:var(--accent);color:var(--accent)}.presets label{display:flex;gap:6px;align-items:center}.presets input{width:45px;background:transparent;color:var(--text);border:0;outline:0}.actions{display:flex;gap:10px}.actions button{border:0;border-radius:14px;font-weight:900;cursor:pointer}.start{flex:1;padding:18px;background:var(--accent);color:var(--bg);letter-spacing:.1em}.reset{width:58px;background:var(--soft);color:var(--text);font-size:24px}.hint{text-align:center;color:var(--muted);font-size:12px}.head{display:flex;justify-content:space-between}.head h2{font-size:30px;margin:0}.count{background:var(--soft);color:var(--accent);padding:10px;border-radius:10px;height:38px}.add{display:flex;margin:32px 0 20px}.add input{flex:1;padding:16px;border:1px solid var(--line);background:var(--soft);color:var(--text);border-radius:13px 0 0 13px;outline:0}.add button{width:54px;border:0;background:var(--accent);color:var(--bg);border-radius:0 13px 13px 0;font-size:25px}.list{min-height:350px}.task{display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);padding:15px 2px}.task span{flex:1;font-size:14px}.task.done span{text-decoration:line-through;color:var(--muted)}.check{width:24px;height:24px;border:2px solid var(--muted);border-radius:7px;background:transparent;color:var(--accent)}.del,.clear{border:0;background:transparent;color:var(--muted);cursor:pointer}.del{font-size:20px}.empty{text-align:center;color:var(--muted);padding:75px 0;line-height:1.7}.empty b{font-size:40px;color:var(--accent)}footer{text-align:center;color:var(--muted);font-size:9px;letter-spacing:.18em}.dnd .top,.dnd .tasks,footer.dndhide{display:none}.dnd .grid{grid-template-columns:1fr;max-width:850px;margin-top:4vh}.dnd .timer{min-height:88vh;display:flex;flex-direction:column;justify-content:center}.dnd .title,.dnd .label,.dnd .clock{text-align:center}@media(max-width:800px){main{padding:20px}.grid{grid-template-columns:1fr;margin-top:30px}.card{min-height:auto;padding:28px}.clock{font-size:90px;margin:45px 0 20px}.brand{font-size:10px}}
</style></head><body><main id="app" class="dark"><header class="top"><div class="brand"><b>∞</b>SURAJ FOCUS</div><div class="tools"><button id="theme">☀ LIGHT</button><button id="dnd">◉ DND</button></div></header><div class="grid"><section class="card timer"><p class="label">CURRENT FOCUS</p><input class="title" id="title" value="Deep Work Session"><div class="clock"><span id="mm">25</span><i>:</i><span id="ss">00</span></div><div class="track"><span id="bar" style="width:0"></span></div><div class="presets"><button data-m="10">10 min</button><button class="sel" data-m="25">25 min</button><button data-m="45">45 min</button><button data-m="60">60 min</button><label>Custom <input id="custom" type="number" min="1" max="180" value="25"></label></div><div class="actions"><button class="start" id="start">▶ START FOCUS</button><button class="reset" id="reset">↻</button></div><p class="hint">One task. One timer. No switching.</p></section><section class="card tasks"><div class="head"><div><p class="label">TODAY</p><h2>Focus tasks</h2></div><b class="count" id="count">0/0</b></div><div class="add"><input id="newtask" placeholder="Add your next action…"><button id="add">+</button></div><div class="list" id="list"></div><button class="clear" id="clear">Clear completed</button></section></div><footer id="foot">● READY WHEN YOU ARE</footer></main><script>
const $=s=>document.querySelector(s),app=$('#app');let mins=25,left=1500,running=false,end=0,timer,tasks=[];try{let x=JSON.parse(localStorage.surajFocus||'{}');tasks=x.tasks||[];if(x.light)app.className='light';if(x.mins)setTime(x.mins)}catch(e){}function save(){localStorage.surajFocus=JSON.stringify({tasks,mins,light:app.classList.contains('light')})}function setTime(m){running=false;clearInterval(timer);mins=Math.max(1,+m||1);left=mins*60;$('#custom').value=mins;document.querySelectorAll('[data-m]').forEach(b=>b.classList.toggle('sel',+b.dataset.m===mins));draw();save()}function draw(){let m=Math.floor(left/60),s=left%60;$('#mm').textContent=String(m).padStart(2,'0');$('#ss').textContent=String(s).padStart(2,'0');$('#bar').style.width=(100-left/(mins*60)*100)+'%';$('#start').textContent=running?'Ⅱ PAUSE':'▶ START FOCUS'}function tick(){left=Math.max(0,Math.ceil((end-Date.now())/1000));draw();if(!left){running=false;clearInterval(timer);$('#start').textContent='✓ COMPLETE';document.title='Focus complete ✓'}}function toggle(){if(running){running=false;clearInterval(timer)}else{if(!left)left=mins*60;running=true;end=Date.now()+left*1000;timer=setInterval(tick,250)}draw()}function render(){let done=tasks.filter(t=>t.done).length;$('#count').textContent=done+'/'+tasks.length;$('#list').innerHTML=tasks.length?tasks.map((t,i)=>`<div class="task ${t.done?'done':''}"><button class="check" onclick="done(${i})">${t.done?'✓':''}</button><span>${t.text.replace(/[<>&]/g,'')}</span><button class="del" onclick="del(${i})">×</button></div>`).join(''):'<div class="empty"><b>✓</b><br>Write one clear task.<br>Then press Start Focus.</div>';save()}window.done=i=>{tasks[i].done=!tasks[i].done;render()};window.del=i=>{tasks.splice(i,1);render()};function add(){let x=$('#newtask');if(x.value.trim()){tasks.push({text:x.value.trim(),done:false});x.value='';render()}}$('#start').onclick=toggle;$('#reset').onclick=()=>setTime(mins);document.querySelectorAll('[data-m]').forEach(b=>b.onclick=()=>setTime(b.dataset.m));$('#custom').onchange=e=>setTime(e.target.value);$('#add').onclick=add;$('#newtask').onkeydown=e=>{if(e.key==='Enter')add()};$('#clear').onclick=()=>{tasks=tasks.filter(t=>!t.done);render()};$('#theme').onclick=()=>{app.classList.toggle('dark');app.classList.toggle('light');$('#theme').textContent=app.classList.contains('dark')?'☀ LIGHT':'● DARK';save()};$('#dnd').onclick=async()=>{app.classList.toggle('dnd');$('#dnd').classList.toggle('on');$('#foot').classList.toggle('dndhide');if(app.classList.contains('dnd'))await document.documentElement.requestFullscreen?.();else await document.exitFullscreen?.()};draw();render();
</script></body></html>
